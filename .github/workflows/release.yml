name: release

# Dispara ao empurrar uma tag de versão, ex.: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  # Permite gerar os binários manualmente (sem publicar release) para testar.
  workflow_dispatch:

permissions:
  contents: write # necessário para criar a release e subir os assets

env:
  GO_VERSION: "1.25"

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME}"
          bin="pull-automator"
          [ "$GOOS" = "windows" ] && bin="pull-automator.exe"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "dist/${bin}" .

      - name: Package
        id: pkg
        run: |
          name="pull-automator_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          cp ../README.md ../.env.example .
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp ../run.ps1 ../run.cmd .
            zip -q "${name}.zip" pull-automator.exe run.ps1 run.cmd README.md .env.example
            echo "asset=dist/${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${name}.tar.gz" pull-automator README.md .env.example
            echo "asset=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.pkg.outputs.asset }}
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # Só publica release quando o gatilho foi uma tag.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
